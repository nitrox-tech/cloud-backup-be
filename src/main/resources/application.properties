spring.application.name=1cloud-be

# API key: required on all requests except GET /health and OPTIONS (CORS). Client sends header X-API-Key.
app.api.key=${API_KEY:change-me-api-key-for-local-dev}
app.api.header-name=X-API-Key

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/telegram_drive}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (minimum 32 chars recommended for HS256)
app.jwt.secret=${JWT_SECRET:change-me-use-at-least-32-chars!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Rules pushed to clients (GET /config/telegram + login). No Bot API for files — user Telegram + groups.
app.telegram.client.schema-version=4
app.telegram.client.integration.file-storage-model=telegram_user_client
app.telegram.client.integration.policy-note=Do not use Bot API in the client for file storage. Use the logged-in user's Telegram session and normal chats/supergroups. Auth endpoint does not verify Telegram widget hash; client-supplied telegram user id is trusted.
app.telegram.client.max-upload-bytes=2147483648
app.telegram.client.recommended-chunk-bytes=1048576
app.telegram.client.upload-retry-max=3
app.telegram.client.bot-username=${TELEGRAM_BOT_USERNAME:}

app.telegram.client.upload-routing.private-archive.storage-context=self_chat_saved_messages_or_cloud
app.telegram.client.upload-routing.private-archive.description=Private archive: store files in the user's own Telegram space (Saved Messages / self chat) via user session, not Bot API.
app.telegram.client.upload-routing.shared-group.storage-context=telegram_supergroup
app.telegram.client.upload-routing.shared-group.description=Shareable archive: invite collaborators into the same Telegram supergroup as real users; files are normal group messages accessible to members per Telegram.
app.telegram.client.upload-routing.shared-group.members-must-join-telegram-supergroup=true

app.telegram.client.archive-group.group-title-mandatory-prefix=nitro-tech-cloud-
app.telegram.client.archive-group.group-title-template=nitro-tech-cloud-{segment}-{suffix}
app.telegram.client.archive-group.segment-meaning=numeric_or_short_archive_identifier
app.telegram.client.archive-group.example-title=nitro-tech-cloud-123-team-alpha
app.telegram.client.archive-group.group-title-client-validation-regex=^nitro-tech-cloud-[0-9]+-[a-zA-Z0-9._-]+$
app.telegram.client.archive-group.max-group-title-length=128
app.telegram.client.archive-group.telegram-group-type=supergroup
app.telegram.client.archive-group.client-onboarding-hint=Create a Telegram supergroup, set the title using the template, invite every collaborator (they must join as users). Link supergroup chat_id to the shareable root in the app. No bot required in the group for this storage model.
