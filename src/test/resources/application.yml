# In-memory DB for tests (no Docker PostgreSQL required)
spring:
  datasource:
    url: jdbc:h2:mem:cloud_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-must-be-32-chars-long!!
  api:
    key: test-api-key
    header-name: X-API-Key
