# In-memory DB for tests (no Docker PostgreSQL required)
spring.datasource.url=jdbc:h2:mem:cloud_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

app.jwt.secret=test-secret-must-be-32-chars-long!!
app.api.key=test-api-key
